<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HaldenG - Contact Me</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- EmailJS SDK -->
  <script type="text/javascript" src="https://cdn.emailjs.com/dist/email.min.js"></script>
  <script type="text/javascript">
    (function(){
       emailjs.init("WTxMGRMWvGk1q9fo1"); // Your public key
    })();
  </script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen p-4">

  <form id="contactForm" class="bg-white shadow-lg rounded-xl p-8 max-w-md w-full space-y-6">
    <h2 class="text-2xl font-bold text-gray-800 text-center">Contact Me</h2>
    <p class="text-gray-500 text-center">Fill in the form and I’ll get back to you ASAP!</p>

    <input type="text" name="name" placeholder="Your Name" required
      class="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" />

    <input type="email" name="email" placeholder="Your Email" required
      class="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" />

    <textarea name="message" placeholder="Your Message" required rows="5"
      class="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 resize-none"></textarea>

    <button type="submit"
      class="w-full bg-blue-600 text-white font-semibold py-3 rounded-lg shadow-md hover:bg-blue-700 transition-colors duration-300">
      Send Message
    </button>
  </form>

  <script>
    const form = document.getElementById('contactForm');

    form.addEventListener('submit', function(e){
      e.preventDefault();

      const name = form.name.value;
      const email = form.email.value;
      const message = form.message.value;

      emailjs.send('service_d43s9ky', 'template_6ng9ubn', {
        from_name: name,
        from_email: email,
        message: message
      })
      .then(() => {
        alert('Message sent! I\'ll get back to you soon.');
        form.reset();
      })
      .catch((err) => {
        alert('Something went wrong. Try again.');
        console.error(err);
      });
    });
  </script>

</body>
</html>
